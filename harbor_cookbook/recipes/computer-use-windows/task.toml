version = "1.0"

[verifier]
timeout_sec = 600.0

[agent]
timeout_sec = 600.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
allow_internet = true

[environment.env]
DAYTONA_API_KEY = "${DAYTONA_API_KEY}"
DAYTONA_API_URL = "${DAYTONA_API_URL:-https://win.trydaytona.com/api}"

[[environment.mcp_servers]]
name = "desktop"
transport = "streamable-http"
url = "http://desktop:8000/mcp"
