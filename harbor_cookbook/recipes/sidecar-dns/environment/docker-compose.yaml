# This file is merged on top of Harbor's base docker-compose config.
# The `main` service is automatically configured by Harbor with the build
# context, image, command, volumes, and resource limits.
# You only need to specify overrides for `main` and define additional services.
services:
  main:
    volumes:
      - ./resolv.conf:/etc/resolv.conf
    depends_on:
      dns-server:
        condition: service_healthy
    networks:
      dnsnet:

  dns-server:
    build:
      context: ./dns-server
    cap_add:
      - NET_ADMIN
    expose:
      - "53"
    networks:
      dnsnet:
        ipv4_address: 10.0.0.53
    healthcheck:
      test: ["CMD", "nslookup", "example.com", "127.0.0.1"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

networks:
  dnsnet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24
