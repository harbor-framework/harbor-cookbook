services:
  main:
    dns: 10.0.0.53
    depends_on:
      dns-server:
        condition: service_healthy
    networks:
      dnsnet:

  dns-server:
    build:
      context: ./dns-server
    cap_add:
      - NET_ADMIN
    expose:
      - "53"
    networks:
      dnsnet:
        ipv4_address: 10.0.0.53
    healthcheck:
      test: ["CMD", "nslookup", "example.com", "127.0.0.1"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

networks:
  dnsnet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24
